version: "3.8"

services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      - PYTHONPATH=/app/src
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=irpf_test
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=test-documents
      - MINIO_SECURE=false
      - LOG_LEVEL=WARNING
      - TESTING=true
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - test-coverage:/app/coverage
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - test-network
    command: >
      pytest tests/
      --cov=irpf_processor
      --cov-report=html:/app/coverage/html
      --cov-report=xml:/app/coverage/coverage.xml
      --cov-report=term-missing
      -v

  test-unit:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      - PYTHONPATH=/app/src
      - TESTING=true
      - LOG_LEVEL=WARNING
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - test-coverage:/app/coverage
    networks:
      - test-network
    command: >
      pytest tests/unit/
      --cov=irpf_processor
      --cov-report=html:/app/coverage/html-unit
      --cov-report=term-missing
      -v

  test-integration:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      - PYTHONPATH=/app/src
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=irpf_test
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=test-documents
      - MINIO_SECURE=false
      - LOG_LEVEL=WARNING
      - TESTING=true
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - test-network
    command: >
      pytest tests/integration/
      -v
      --tb=short

  mongo:
    image: mongo:7.0
    environment:
      - MONGO_INITDB_DATABASE=irpf_test
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network
    tmpfs:
      - /data/db

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network
    tmpfs:
      - /data

networks:
  test-network:
    driver: bridge

volumes:
  test-coverage:
