  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: irpf-processor-fake-gcs
    restart: unless-stopped
    ports:
      - "4443:4443"
    volumes:
      - gcs-data:/data
    command: -scheme http -public-host localhost:4443 -backend memory
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - irpf-processor-network

  fake-gcs-setup:
    image: curlimages/curl:latest
    container_name: irpf-processor-fake-gcs-setup
    depends_on:
      fake-gcs:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        curl -X POST 'http://fake-gcs:4443/storage/v1/b?project=local-project' \
          -H 'Content-Type: application/json' \
          -d '{"name": "irpf-documents"}' || true
    networks:
      - irpf-processor-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: irpf-processor-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=gcs
      - GCP_BUCKET=irpf-documents
      - GCP_AUTH_TYPE=anonymous
      - GCP_EMULATOR_ENDPOINT=http://fake-gcs:4443
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
      # - SKIP_DUPLICATE_CHECK=true  # Uncomment to always reprocess (or use force=true in API)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - irpf-processor-network
    volumes:
      # - ./src:/app/src:ro
      - ./src:/app/src

  worker-router:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-router
    container_name: irpf-processor-worker-router
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=gcs
      - GCP_BUCKET=irpf-documents
      - GCP_AUTH_TYPE=anonymous
      - GCP_EMULATOR_ENDPOINT=http://fake-gcs:4443
      - PUSHGATEWAY_URL=pushgateway:9091
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
    command: dramatiq irpf_processor.presentation.workers --queues extraction-router --processes 1 --threads 2
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - irpf-processor-network
    volumes:
      - ./src:/app/src:ro

  worker-digital:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-digital
    container_name: irpf-processor-worker-digital
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=gcs
      - GCP_BUCKET=irpf-documents
      - GCP_AUTH_TYPE=anonymous
      - GCP_EMULATOR_ENDPOINT=http://fake-gcs:4443
      - PUSHGATEWAY_URL=pushgateway:9091
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
    command: dramatiq irpf_processor.presentation.workers --queues default --processes 6 --threads 12
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - irpf-processor-network
    volumes:
      # - ./src:/app/src:ro
      - ./src:/app/src

  worker-ocr:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-ocr
    container_name: irpf-processor-worker-ocr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=gcs
      - GCP_BUCKET=irpf-documents
      - GCP_AUTH_TYPE=anonymous
      - GCP_EMULATOR_ENDPOINT=http://fake-gcs:4443
      - PUSHGATEWAY_URL=pushgateway:9091
      - OCR_TIMEOUT_SECONDS=300
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/documentai-key.json
    command: dramatiq irpf_processor.presentation.workers.ocr_worker --queues extraction-ocr --processes 3 --threads 6
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - irpf-processor-network
    volumes:
      # - ./src:/app/src:ro
      - ./src:/app/src
      - ./credentials:/app/credentials:ro

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: irpf-processor-prometheus
    restart: unless-stopped
    ports:
      - "9095:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - irpf-processor-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: irpf-processor-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - irpf-processor-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: irpf-processor-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - irpf-processor-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: irpf-processor-mongodb-exporter
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
    command:
      - '--collect-all'
      - '--compatible-mode'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - irpf-processor-network

  pushgateway:
    image: prom/pushgateway:v1.6.2
    container_name: irpf-processor-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - irpf-processor-network

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: irpf-processor-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - irpf-processor-network

volumes:
  mongo-data:
    name: irpf-processor-mongo-data
  redis-data:
    name: irpf-processor-redis-data
  minio-data:
    name: irpf-processor-minio-data
  gcs-data:
    name: irpf-processor-gcs-data
  prometheus-data:
    name: irpf-processor-prometheus-data
  grafana-data:
    name: irpf-processor-grafana-data

networks:
  irpf-processor-network:
    name: irpf-processor-network
    driver: bridge
